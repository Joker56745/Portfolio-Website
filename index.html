<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egor | Frontend Developer</title>

<style>
:root{
  --bg:#05060a;
  --card:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.1);
  --accent:#7c5cff;
  --accent2:#00ff9d;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:system-ui;
  background:var(--bg);
  color:white;
  overflow-x:hidden;
}

/* 🌈 GLOW */
.glow{
  position:fixed;
  width:600px;height:600px;
  background:radial-gradient(circle,var(--accent),transparent 60%);
  filter:blur(120px);
  opacity:.4;
  top:-200px;left:-200px;
  transition:0.2s;
}
.glow2{
  position:fixed;
  width:500px;height:500px;
  background:radial-gradient(circle,var(--accent2),transparent 60%);
  filter:blur(140px);
  opacity:.25;
  bottom:-200px;right:-200px;
}

/* NAV */
nav{
  position:fixed;
  top:0;width:100%;
  display:flex;
  justify-content:space-between;
  padding:18px 6%;
  backdrop-filter:blur(20px);
  background:rgba(0,0,0,.4);
  border-bottom:1px solid var(--border);
  z-index:100;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:0 20px;
}

.hero h1{
  font-size:4rem;
}

.hero span{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* BUTTONS */
.btn{
  display:inline-block;
  padding:12px 18px;
  margin:6px;
  border-radius:12px;
  text-decoration:none;
  transition:.25s;
}

.primary{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:black;
  font-weight:600;
}

.secondary{
  border:1px solid var(--border);
  color:white;
}

.btn:hover{
  transform:translateY(-4px);
}

/* SECTIONS */
section{
  padding:90px 8%;
}

/* CARDS */
.card{
  background:var(--card);
  border:1px solid var(--border);
  backdrop-filter:blur(20px);
  border-radius:18px;
  padding:30px;
  max-width:800px;
  margin:auto;
  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
}

/* PROJECTS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:18px;
}

.project{
  background:var(--card);
  border:1px solid var(--border);
  padding:22px;
  border-radius:16px;
  text-decoration:none;
  color:white;
  transition:.3s;
  opacity:0;
  transform:translateY(40px);
}

.project:hover{
  transform:translateY(-10px) scale(1.02);
  border-color:rgba(124,92,255,.5);
  box-shadow:0 20px 40px rgba(0,0,0,.4);
}

/* SHOW CLASS (scroll animation) */
.show{
  opacity:1 !important;
  transform:translateY(0) !important;
}
</style>
</head>

<body>

<div class="glow" id="glow"></div>
<div class="glow2"></div>

<nav>
  <div><b>Egor.dev</b></div>
  <div>
    <a href="#projects" style="color:white;margin-right:20px;text-decoration:none;">Projects</a>
    <a href="#about" style="color:white;text-decoration:none;">About</a>
  </div>
</nav>

<section class="hero">
  <div>
    <h1>Hi, I'm <span>Egor</span></h1>
    <p>Frontend Developer • UI/UX • React in progress</p>

    <div>
      <a class="btn primary" href="#projects">View Work</a>
      <a class="btn secondary" href="https://github.com/">GitHub</a>
    </div>
  </div>
</section>

<section id="about">
  <div class="card reveal">
    <h2>About me</h2>
    <p>
      I build modern web apps with focus on UI, animations and performance.
      I enjoy turning ideas into clean, interactive experiences.
    </p>
  </div>
</section>

<section id="projects">
  <div class="grid">

    <a class="project reveal" href="https://joker56745.github.io/movie-search-engine/">
      🎬 Movie Search
    </a>

    <a class="project reveal" href="https://joker56745.github.io/API-weather/">
      🌦 Weather App
    </a>

    <a class="project reveal" href="https://joker56745.github.io/exchange-rate/">
      💱 Currency Converter
    </a>

  </div>
</section>

<script>
/* 🌊 SCROLL REVEAL */
const items = document.querySelectorAll('.reveal, .project');

const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add('show');
    }
  });
},{threshold:0.15});

items.forEach(el=>observer.observe(el));

/* 🖱 PARALLAX GLOW */
document.addEventListener("mousemove",(e)=>{
  const x = (e.clientX / window.innerWidth - 0.5) * 40;
  const y = (e.clientY / window.innerHeight - 0.5) * 40;

  document.getElementById("glow").style.transform =
    `translate(${x}px,${y}px)`;
});
</script>

</body>
</html>
