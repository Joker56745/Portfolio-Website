<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egor | Frontend Developer</title>

<style>
:root {
  --bg: #0a0a0a;
  --card: #161616;
  --accent: #00ff9d;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: Arial;
  background: var(--bg);
  color: #e0e0e0;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0,0,0,0.9);
  padding: 15px 5%;
  display: flex;
  justify-content: space-between;
}

.logo {
  color: var(--accent);
  font-size: 1.5rem;
  font-weight: bold;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-size: 3.5rem;
}

.hero span {
  color: var(--accent);
}

/* SECTIONS */
section {
  padding: 80px 5%;
  text-align: center;
}

h2 {
  color: var(--accent);
  margin-bottom: 30px;
}

/* PROJECTS */
.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
  gap: 20px;
}

.card {
  background: var(--card);
  border-radius: 12px;
  overflow: hidden;
  transition: 0.3s;
  position: relative;
}

.card:hover {
  transform: translateY(-10px);
}

/* IMAGE */
.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* OVERLAY */
.overlay {
  position: absolute;
  top: 0;
  left: 0;
  height: 200px;
  width: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transition: 0.3s;
}

.card:hover .overlay {
  opacity: 1;
}

.overlay span {
  background: var(--accent);
  color: black;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: bold;
}

/* CONTENT */
.card-content {
  padding: 15px;
}

a {
  color: var(--accent);
  text-decoration: none;
}

/* CONTACT */
.contact {
  background: #111;
}
</style>
</head>

<body>

<div class="hero">
  <div>
    <h1>Hi, I'm <span>Egor</span></h1>
    <p>Frontend Developer</p>
  </div>
</div>

<section>
  <h2>Projects</h2>

  <div class="projects">

    <!-- MOVIE -->
    <div class="card">
     <img src="https://image.thum.io/get/width/800/https://joker56745.github.io/movie-search-engine/">
      <div class="overlay"><span>Open</span></div>
      <div class="card-content">
        <h3>Movie Search</h3>
        <a href="https://joker56745.github.io/movie-search-engine/" target="_blank">Live</a> |
        <a href="https://github.com/Joker56745/movie-search-engine" target="_blank">Code</a>
      </div>
    </div>

    <!-- WEATHER -->
    <div class="card">
    <img src="https://image.thum.io/get/width/800/https://joker56745.github.io/API-weather/">
      <div class="overlay"><span>Open</span></div>
      <div class="card-content">
        <h3>Weather App</h3>
        <a href="https://joker56745.github.io/API-weather/" target="_blank">Live</a> |
        <a href="https://github.com/Joker56745/API-weather" target="_blank">Code</a>
      </div>
    </div>

    <!-- CURRENCY -->
    <div class="card">
      <img src="https://image.thum.io/get/width/800/https://joker56745.github.io/exchange-rate/">
      <div class="overlay"><span>Open</span></div>
      <div class="card-content">
        <h3>Currency Converter</h3>
        <a href="https://joker56745.github.io/exchange-rate/" target="_blank">Live</a> |
        <a href="https://github.com/Joker56745/exchange-rate" target="_blank">Code</a>
      </div>
    </div>

  </div>
</section>

<section class="contact">
  <h2>Contact</h2>
  <p>Email: egor.your.email@gmail.com</p>
  <p>GitHub: <a href="https://github.com/Joker56745">Profile</a></p>
</section>

</body>
</html>
